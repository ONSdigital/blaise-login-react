---
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/blaise-login-react-client"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    timezone: "Europe/London"
    labels:
      - "dependencies"
      - "client"
  - package-ecosystem: "npm"
    directory: "/blaise-login-react-server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    timezone: "Europe/London"
    labels:
      - "dependencies"
      - "server"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    timezone: "Europe/London"
    labels:
      - "dependencies"
      - "github-actions"
