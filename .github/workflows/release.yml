---
name: 🔄 Sync Version
permissions:
  contents: write
on:
  release:
    types: [published]
jobs:
  sync-version:
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.target_commitish }}
      - name: 🔧 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: 📝 Update package.json Versions
        run: |
          CLEAN_VERSION=$(echo "${{ github.event.release.tag_name }}" | sed 's/^v//')
          npm version $CLEAN_VERSION --no-git-tag-version
          cd blaise-login-react-client
          npm version $CLEAN_VERSION --no-git-tag-version
          cd ..
          cd blaise-login-react-server
          npm version $CLEAN_VERSION --no-git-tag-version
          cd ..
          echo "NEW_VERSION=$CLEAN_VERSION" >> $GITHUB_ENV
      - name: 🚀 Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: bump versions to ${{ env.NEW_VERSION }}"
          file_pattern: 'package.json blaise-login-react-client/package.json blaise-login-react-server/package.json'
